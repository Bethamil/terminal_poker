replicaCount: 1

image:
  registry: ghcr.io
  repository: bethamil/terminal_poker
  tag: "0.1.0"
  pullPolicy: IfNotPresent

command: ["sh"]
args:
  - -lc
  - >-
    test -n "$DATABASE_URL" &&
    cd /app &&
    pnpm --filter @terminal-poker/backend exec prisma db push &&
    node apps/backend/dist/server.js

containerPorts:
  http: 4000

ingress:
  enabled: true
  hostname: poker.example.com
  tls: true
  tlsIssuerName: letsencrypt-production

resources:
  requests:
    memory: 256Mi
    cpu: 150m
  limits:
    memory: 512Mi
    cpu: 500m

livenessProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 20

readinessProbe:
  enabled: true
  path: /readyz
  initialDelaySeconds: 10

extraEnvVars:
  - name: PORT
    value: "4000"
  - name: CLIENT_ORIGIN
    value: "https://poker.example.com"
  - name: DATABASE_URL
    value: "postgresql://REPLACE_ME"
  - name: ROOM_INACTIVITY_TTL_HOURS
    value: "24"
  - name: REDIS_MODE
    value: "none"
  # Enable one of the Redis modes below when running multiple replicas.
  # - name: REDIS_MODE
  #   value: "standalone"
  # - name: REDIS_URL
  #   value: "redis://REPLACE_ME:6379"
  # - name: REDIS_MODE
  #   value: "sentinel"
  # - name: REDIS_SENTINEL_URL
  #   value: "redis://sentinel-1:26379,redis://sentinel-2:26379,redis://sentinel-3:26379"
  # - name: REDIS_SENTINEL_MASTER_NAME
  #   value: "mymaster"

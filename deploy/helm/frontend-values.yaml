image:
  registry: docker.io
  repository: your-registry/terminal-poker-frontend
  tag: "latest"
  pullPolicy: IfNotPresent

containerPorts:
  http: 80

ingress:
  enabled: true
  hostname: poker.example.com
  tls: true
  tlsIssuerName: letsencrypt-production

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 10

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 5

